<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>agent-freeboard</title>
	<meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="viewport" content = "width = device-width, initial-scale = 1, user-scalable = no" />
    <link href="css/freeboard.min.css" rel="stylesheet" />
    <script src="js/freeboard.thirdparty.min.js"></script>
    <script type="text/javascript">
        head.js("js/freeboard_plugins.min.js",
                // *** Load more plugins here ***
                function(){
                    $(function()
                    { //DOM Ready
                        freeboard.initialize(true);

                        var hashpattern = window.location.hash.match(/(&|#)source=([^&]+)/);
                        var savepattern = window.location.hash.match(/(&|#)save=([^&]+)/);
                        var projectSaveEndpoint = savepattern !== null ? decodeURIComponent(savepattern[2]) : "/api/dashboard";

                        function loadProjectDashboard() {
                            if (!window.agentFreeboardProjectSource) {
                                alert("Project dashboard is unavailable in this preview.");
                                return;
                            }

                            $.getJSON(window.agentFreeboardProjectSource)
                                .done(function(data) {
                                    freeboard.loadDashboard(data, function() {
                                        freeboard.setEditing(true);
                                    });
                                })
                                .fail(function(xhr) {
                                    alert("Project dashboard load failed: " + (xhr.statusText || "unknown error"));
                                });
                        }

                        function setProjectSaveMode(available, enabled, endpoint) {
                            window.agentFreeboardDetectedSaveEndpoint = available ? endpoint : null;
                            window.agentFreeboardSaveEndpoint = available && enabled ? endpoint : null;
                            $("#project-save-toggle").prop("disabled", !available).prop("checked", Boolean(available && enabled));
                            $("#project-save-mode").toggleClass("enabled", Boolean(available && enabled));
                            $("#project-save-mode-value").text(available && enabled ? "Local write-back active" : "Download JSON fallback");
                            $("#project-save-mode-detail").text(available ? (enabled ? "Save Dashboard writes to the project file." : "Save Dashboard downloads JSON.") : "Project file save is unavailable in this preview.");
                        }

                        setProjectSaveMode(false, false, projectSaveEndpoint);
                        $("#project-save-toggle").on("change", function() {
                            setProjectSaveMode(Boolean(window.agentFreeboardDetectedSaveEndpoint), this.checked, window.agentFreeboardDetectedSaveEndpoint || projectSaveEndpoint);
                        });

                        $.ajax({ url: projectSaveEndpoint, type: "GET", dataType: "json", cache: false })
                            .done(function(capability) {
                                var projectAvailable = Boolean(capability && capability.ok);
                                var writeAvailable = Boolean(capability && capability.writeEnabled);
                                window.agentFreeboardProjectSource = projectAvailable ? "/dashboard.json" : null;
                                $("#project-load-dashboard").toggleClass("disabled", !projectAvailable);
                                setProjectSaveMode(writeAvailable, writeAvailable, projectSaveEndpoint);
                                if (hashpattern === null && projectAvailable) {
                                    loadProjectDashboard();
                                }
                            })
                            .fail(function() {
                                window.agentFreeboardProjectSource = null;
                                $("#project-load-dashboard").addClass("disabled");
                                setProjectSaveMode(false, false, projectSaveEndpoint);
                            });
                        if (hashpattern !== null) {
                            $.getJSON(decodeURIComponent(hashpattern[2]), function(data) {
                                freeboard.loadDashboard(data, function() {
                                    var editpattern = window.location.hash.match(/(&|#)edit=(true|1|yes)/i);
                                    freeboard.setEditing(editpattern !== null);
                                });
                            });
                        }

                        window.agentFreeboardLoadProjectDashboard = loadProjectDashboard;

                    });
                });
    </script>
</head>
<body>
<div id="board-content">
    <img id="dash-logo" data-bind="attr:{src: header_image}, visible:header_image()">
    <div class="gridster responsive-column-width">
        <ul data-bind="grid: true">
        </ul>
    </div>
</div>
<header id="main-header" data-bind="if:allow_edit">
    <div id="admin-bar">
        <div id="admin-menu">
            <div id="board-tools">
                <h1 id="board-logo" class="title bordered">agent-freeboard editor</h1>
                <div id="board-actions">
                    <ul class="board-toolbar vertical">
                        <li data-bind="click: loadDashboardFromLocalFile"><i id="full-screen-icon" class="icon-folder-open icon-white"></i><label id="full-screen">Load JSON</label></li>
                        <li id="project-load-dashboard" class="disabled" data-bind="click: loadDashboardFromProject"><i class="icon-refresh icon-white"></i><label>Load Project</label></li>
                        <li><i class="icon-download-alt icon-white"></i><label data-bind="click: saveDashboardClicked">Save Dashboard</label></li>
                        <li id="add-pane" data-bind="click: createPane"><i class="icon-plus icon-white"></i><label>Add Pane</label></li>
                    </ul>
                    <div id="project-save-mode" class="project-save-mode">
                        <div class="project-save-mode-header">
                            <div class="project-save-mode-label">Project Save Mode</div>
                            <label class="project-save-toggle"><input id="project-save-toggle" type="checkbox" disabled> Save to project</label>
                        </div>
                        <div id="project-save-mode-value" class="project-save-mode-value">Download JSON fallback</div>
                        <div id="project-save-mode-detail" class="project-save-mode-detail">Project file save is unavailable in this preview.</div>
                    </div>
                </div>
            </div>
            <div id="datasources">
                <h2 class="title">Datasources</h2>

                <div class="datasource-list-container">
                    <table class="table table-condensed sub-table" id="datasources-list" data-bind="if: datasources().length">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Last Updated</th>
                            <th>&nbsp;</th>
                        </tr>
                        </thead>
                        <tbody data-bind="foreach: datasources">
                        <tr>
                            <td>
                                <span class="text-button datasource-name" data-bind="text: name, pluginEditor: {operation: 'edit', type: 'datasource'}"></span>
                            </td>
                            <td data-bind="text: last_updated"></td>
                            <td>
                                <ul class="board-toolbar">
                                    <li data-bind="click: updateNow"><i class="icon-refresh icon-white"></i></li>
                                    <li data-bind="pluginEditor: {operation: 'delete', type: 'datasource'}">
                                        <i class="icon-trash icon-white"></i></li>
                                </ul>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <span class="text-button table-operation" data-bind="pluginEditor: {operation: 'add', type: 'datasource'}">ADD</span>
            </div>
        </div>
    </div>
	<div id="column-tools" class="responsive-column-width">
		<ul class="board-toolbar left-columns">
			<li class="column-tool add" data-bind="click: addGridColumnLeft"><span class="column-icon right"></span><i class="icon-arrow-left icon-white"></i></li>
			<li class="column-tool sub" data-bind="click: subGridColumnLeft"><span class="column-icon left"></span><i class="icon-arrow-right icon-white"></i></li>
		</ul>
		<ul class="board-toolbar right-columns">
			<li class="column-tool sub" data-bind="click: subGridColumnRight"><span class="column-icon right"></span><i class="icon-arrow-left icon-white"></i></li>
			<li class="column-tool add" data-bind="click: addGridColumnRight"><span class="column-icon left"></span><i class="icon-arrow-right icon-white"></i></li>
		</ul>
	</div>
    <div id="toggle-header" data-bind="click: toggleEditing">
        <i id="toggle-header-icon" class="icon-wrench icon-white"></i></div>
</header>

<div style="display:hidden">
    <ul data-bind="template: { name: 'pane-template', foreach: panes}">
    </ul>
</div>

<script type="text/html" id="pane-template">
    <li data-bind="pane: true">
        <header>
            <h1 class="pane-title" data-bind="editableText: title, editable: $root.isEditing"></h1>
            <ul class="board-toolbar pane-tools">
                <li data-bind="pluginEditor: {operation: 'add', type: 'widget'}">
                    <i class="icon-plus icon-white"></i>
                </li>
                <li data-bind="pluginEditor: {operation: 'edit', type: 'pane'}">
                    <i class="icon-wrench icon-white"></i>
                </li>
                <li data-bind="pluginEditor: {operation: 'delete', type: 'pane'}">
                    <i class="icon-trash icon-white"></i>
                </li>
            </ul>
        </header>
        <section data-bind="foreach: widgets">
            <div class="sub-section" data-bind="css: 'sub-section-height-' + height()">
                <div class="widget" data-bind="widget: true, css:{fillsize:fillSize}"></div>
                <div class="sub-section-tools">
                    <ul class="board-toolbar">
                        <!-- ko if:$parent.widgetCanMoveUp($data) -->
                        <li data-bind="click:$parent.moveWidgetUp"><i class="icon-chevron-up icon-white"></i></li>
                        <!-- /ko -->
                        <!-- ko if:$parent.widgetCanMoveDown($data) -->
                        <li data-bind="click:$parent.moveWidgetDown"><i class="icon-chevron-down icon-white"></i></li>
                        <!-- /ko -->
                        <li data-bind="pluginEditor: {operation: 'edit', type: 'widget'}"><i class="icon-wrench icon-white"></i></li>
                        <li data-bind="pluginEditor: {operation: 'delete', type: 'widget'}"><i class="icon-trash icon-white"></i></li>
                    </ul>
                </div>
            </div>
        </section>
        <button type="button" class="pane-add-widget" data-bind="visible: $root.isEditing, pluginEditor: {operation: 'add', type: 'widget'}">Add widget</button>
    </li>
</script>

</body>
</html>
